<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAYO REISEN - Quiz</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="quiz-container">
        <div class="vayo-header">
            <div class="logo-container">
                <span class="vayo-logo-text">VAYO</span>
                <div class="vayo-logo-icon">
                    <div class="segment-pink"></div>
                    <div class="segment-yellow"></div>
                    <div class="segment-teal"></div>
                    <div class="compass-arrow"></div>
                </div>
            </div>
            <div class="logo-subtext">REISEN</div>
        </div>

        <div id="start-screen" class="screen">
            <h1>Welcher Reisetyp bist du?</h1>
            <p>Dein Vibe. Deine Welt. Finde in 20 kurzen Fragen heraus, welches VAYO-Abenteuer perfekt zu dir passt!</p>
            <button id="start-btn">Jetzt Quiz starten</button>
        </div>

        <div id="quiz-screen" class="screen hidden">
            <div class="progress-bar"><div id="progress"></div></div>
            <h2 id="question-text">Hier steht die Frage</h2>
            <div id="answer-buttons" class="btn-grid"></div>
        </div>

        <div id="result-screen" class="screen hidden">
            <div id="vayo-piktogramm-box"></div>
            
            <h2>Dein perfektes Match:</h2>
            <h1 id="match-name">Reiseziel-Name</h1>
            <h3 id="match-headline"></h3>
            
            <p id="match-description">Abgleich mit der Datenbank...</p>
            
            <div id="vayo-details-trigger" class="details-badge">
                <i class="fa-solid fa-circle-info"></i> Vollständigen Reiseplan anzeigen
            </div>
            
            <div id="vayo-full-itinerary" class="itinerary-box hidden">
                <h4>Dein Programm von Tag zu Tag:</h4>
                <div id="itinerary-steps"></div>
            </div>
            
            <div id="ranking-list"></div>

            <button id="cta-btn">Jetzt unverbindlich anfragen</button>
            <button id="restart-btn">Quiz wiederholen</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
